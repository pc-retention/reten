<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA fix: redirect to index with path in query string
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/reten/?p=' + encodeURIComponent(l.pathname.replace('/reten', '') + l.search) +
      (l.hash || '')
    );
  </script>
</head>
</html>
